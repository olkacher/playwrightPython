[pytest]
# Path to the tests (equivalent to testDir)
testpaths = e2e/tests

# Note: timeout and retries require pytest-timeout and pytest-rerunfailures plugins
# They are commented out as they're not installed by default
# Uncomment and install plugins if needed:
#   pip install pytest-timeout pytest-rerunfailures
# timeout = 60
# retries = 1

# Reporter configuration (equivalent to reporter and outputDir)
addopts = 
    --screenshot=only-on-failure
    --video=retain-on-failure
    --tracing=retain-on-failure

    --html=e2e/reports/pytest_report.html
    --self-contained-html
    --junit-xml=e2e/reports/results.xml

# Multi-browser testing usage:
# pytest e2e/tests/ --browser webkit --browser firefox --browser chromium

# Custom markers for authentication contexts
markers =
    public: Tests that don't require authentication
    authenticated: Tests that require pre-authenticated browser state
    sequential: Tests that must run in specific order